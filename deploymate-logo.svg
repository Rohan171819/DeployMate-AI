<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 140" width="400" height="140">
  <defs>
    <!-- Main gradient background -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e1a"/>
      <stop offset="100%" style="stop-color:#0d1b2e"/>
    </linearGradient>

    <!-- Rocket gradient -->
    <linearGradient id="rocketGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="100%" style="stop-color:#0077ff"/>
    </linearGradient>

    <!-- Glow filter -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Strong glow -->
    <filter id="strongGlow">
      <feGaussianBlur stdDeviation="5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Clip path for rounded rect -->
    <clipPath id="roundClip">
      <rect width="400" height="140" rx="18"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="400" height="140" rx="18" fill="url(#bgGrad)"/>

  <!-- Grid lines subtle -->
  <g opacity="0.04" clip-path="url(#roundClip)">
    <line x1="0" y1="20" x2="400" y2="20" stroke="#00d4ff" stroke-width="1"/>
    <line x1="0" y1="40" x2="400" y2="40" stroke="#00d4ff" stroke-width="1"/>
    <line x1="0" y1="60" x2="400" y2="60" stroke="#00d4ff" stroke-width="1"/>
    <line x1="0" y1="80" x2="400" y2="80" stroke="#00d4ff" stroke-width="1"/>
    <line x1="0" y1="100" x2="400" y2="100" stroke="#00d4ff" stroke-width="1"/>
    <line x1="0" y1="120" x2="400" y2="120" stroke="#00d4ff" stroke-width="1"/>
    <line x1="40" y1="0" x2="40" y2="140" stroke="#00d4ff" stroke-width="1"/>
    <line x1="80" y1="0" x2="80" y2="140" stroke="#00d4ff" stroke-width="1"/>
    <line x1="120" y1="0" x2="120" y2="140" stroke="#00d4ff" stroke-width="1"/>
    <line x1="160" y1="0" x2="160" y2="140" stroke="#00d4ff" stroke-width="1"/>
    <line x1="200" y1="0" x2="200" y2="140" stroke="#00d4ff" stroke-width="1"/>
    <line x1="240" y1="0" x2="240" y2="140" stroke="#00d4ff" stroke-width="1"/>
    <line x1="280" y1="0" x2="280" y2="140" stroke="#00d4ff" stroke-width="1"/>
    <line x1="320" y1="0" x2="320" y2="140" stroke="#00d4ff" stroke-width="1"/>
    <line x1="360" y1="0" x2="360" y2="140" stroke="#00d4ff" stroke-width="1"/>
  </g>

  <!-- Glowing circle behind icon -->
  <circle cx="62" cy="70" r="38" fill="#00d4ff" opacity="0.06" filter="url(#strongGlow)"/>
  <circle cx="62" cy="70" r="30" fill="none" stroke="#00d4ff" stroke-width="0.8" opacity="0.2"/>

  <!-- Icon: Rocket inside hexagon -->
  <!-- Hexagon border -->
  <polygon points="62,32 88,47 88,77 62,92 36,77 36,47"
           fill="none" stroke="#00d4ff" stroke-width="1.5" opacity="0.6" filter="url(#glow)"/>

  <!-- Rocket body -->
  <g transform="translate(62,70) rotate(-45)" filter="url(#glow)">
    <!-- Rocket main body -->
    <ellipse cx="0" cy="0" rx="7" ry="13" fill="url(#rocketGrad)"/>
    <!-- Rocket tip -->
    <polygon points="0,-18 -5,-8 5,-8" fill="#00d4ff"/>
    <!-- Rocket fins -->
    <polygon points="-7,6 -13,16 -4,10" fill="#0077ff"/>
    <polygon points="7,6 13,16 4,10" fill="#0077ff"/>
    <!-- Rocket window -->
    <circle cx="0" cy="-2" r="3" fill="#0a0e1a" stroke="#00d4ff" stroke-width="1"/>
    <!-- Flame -->
    <ellipse cx="0" cy="17" rx="4" ry="6" fill="#ff6b35" opacity="0.9"/>
    <ellipse cx="0" cy="18" rx="2.5" ry="4" fill="#ffcc00" opacity="0.9"/>
  </g>

  <!-- Bracket decoration left -->
  <text x="108" y="58" font-family="'Courier New', monospace" font-size="28" fill="#00d4ff" opacity="0.3">&lt;/&gt;</text>

  <!-- Main title: DeployMate -->
  <text x="148" y="72"
        font-family="'Georgia', serif"
        font-size="34"
        font-weight="700"
        letter-spacing="1"
        fill="#ffffff"
        filter="url(#glow)">Deploy<tspan fill="#00d4ff">Mate</tspan></text>

  <!-- Subtitle: AI -->
  <text x="149" y="95"
        font-family="'Courier New', monospace"
        font-size="13"
        letter-spacing="6"
        fill="#00d4ff"
        opacity="0.85">AI  DEVOPS  CO-PILOT</text>

  <!-- Decorative line -->
  <line x1="148" y1="100" x2="370" y2="100" stroke="#00d4ff" stroke-width="0.5" opacity="0.3"/>

  <!-- Small dots decoration -->
  <circle cx="378" cy="50" r="2" fill="#00d4ff" opacity="0.4"/>
  <circle cx="385" cy="60" r="1.5" fill="#00d4ff" opacity="0.3"/>
  <circle cx="375" cy="68" r="1" fill="#00d4ff" opacity="0.2"/>

  <!-- Border glow -->
  <rect width="400" height="140" rx="18" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.2"/>
</svg>
